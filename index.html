<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="TempoDeck">
        <link rel="apple-touch-icon" href="https://github.com/tndrtn081998/TempoMusic/blob/main/icon.jpg?raw=true">
        <title>TempoDeck — Minimal BPM Finder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; margin: 0; }
        .app { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.5rem; color: var(--primary); text-align: center; margin-bottom: 20px; }

        #songCount { text-align: center; color: #64748b; font-size: 0.8rem; margin-bottom: 15px; font-weight: 600; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); flex: 1; outline: none; }

        .button-section { margin-bottom: 20px; }
        .label { font-size: 0.75rem; color: #64748b; margin-bottom: 8px; font-weight: 600; }
        .grid-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .chip { padding: 8px 5px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chip-text { font-size: 0.75rem; font-weight: 600; }
        .chip-bpm { font-size: 0.6rem; color: #64748b; margin-top: 2px; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .chip.active .chip-bpm { color: #dbeafe; }

        .grid-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .action-chip { padding: 10px 5px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-align: center; }
        #clearFilter { background: #f1f5f9; }
        #randomBtn { background: #e11d48; color: white; border: none; }
        #sortBpm { background: #0f172a; color: white; border: none; }

        .song-row { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; margin-bottom: 8px; }
        .bpm-badge { background: #eff6ff; color: var(--primary); font-weight: 600; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; margin-right: 12px; }
        .song-info { flex: 1; }
        .song-title { font-weight: 600; display: block; font-size: 0.9rem; }
        .song-artist { font-size: 0.75rem; color: #64748b; }
        .yt-link { background-color: #2563eb; color: white; padding: 6px 12px; border-radius: 8px; text-decoration: none; font-size: 0.75rem; font-weight: 600; margin-left: auto; }
    </style>
</head>
<body>

<div class="app">
    <h1>TempoDeck</h1>
    <div id="songCount">กำลังโหลดข้อมูล...</div>
    
    <div class="controls">
        <input type="number" id="sBpm" placeholder="BPM">
        <select id="sLang">
            <option value="all">ทุกภาษา</option>
            <option value="ไทย">ไทย</option>
            <option value="สากล">สากล</option>
            <option value="ญี่ปุ่น">ญี่ปุ่น</option>
            <option value="เกาหลี">เกาหลี</option>
            <option value="จีน">จีน</option>
        </select>
    </div>
    
    <div class="button-section">
        <div class="label">FILTER BY BPM</div>
        <div class="grid-group">
            <button class="chip btn-filter" data-min="60" data-max="90"><span class="chip-text">ผ่อนคลาย</span><span class="chip-bpm">60-90</span></button>
            <button class="chip btn-filter" data-min="90" data-max="110"><span class="chip-text">เดิน</span><span class="chip-bpm">90-110</span></button>
            <button class="chip btn-filter" data-min="110" data-max="130"><span class="chip-text">เต้น</span><span class="chip-bpm">110-130</span></button>
            <button class="chip btn-filter" data-min="130" data-max="160"><span class="chip-text">วิ่ง</span><span class="chip-bpm">130-160</span></button>
            <button class="chip btn-filter" data-min="160" data-max="190"><span class="chip-text">HIIT</span><span class="chip-bpm">160-190</span></button>
        </div>
    </div>

    <div class="button-section">
        <div class="label">ACTIONS</div>
        <div class="grid-actions">
            <button class="action-chip" id="clearFilter">ล้าง</button>
            <button class="action-chip" id="randomBtn">สุ่ม</button>
            <button class="action-chip" id="sortBpm">Sort ⇅</button>
        </div>
    </div>
    
    <div id="randomResult"></div>
    <div id="results"></div>
</div>

let activeMin = null, activeMax = null, sortAsc = true;

function getFilteredSongs() {
    const langQuery = document.getElementById('sLang').value;
    const inputBpm = document.getElementById('sBpm').value;
    return MUSIC_DB.filter(s => {
        const matchLang = langQuery !== 'all' ? (s.lang === langQuery) : true;
        let matchBpm = (activeMin !== null) ? (s.bpm >= activeMin && s.bpm <= activeMax) : (inputBpm ? (s.bpm >= parseInt(inputBpm)-10 && s.bpm <= parseInt(inputBpm)+10) : true);
        return matchBpm && matchLang;
    });
}

function render() {
    const container = document.getElementById('results');
    container.innerHTML = '';
    const filtered = getFilteredSongs();
    document.getElementById('songCount').innerText = `พบ ${filtered.length} เพลง จากทั้งหมด ${MUSIC_DB.length} เพลง`;
    filtered.forEach(s => {
        container.innerHTML += `<div class="song-row">
            <div class="bpm-badge">${s.bpm}</div>
            <div class="song-info"><span class="song-title">${s.title}</span><span class="song-artist">${s.artist}</span></div>
            <a href="https://music.youtube.com/search?q=${encodeURIComponent(s.title + ' ' + s.artist)}" target="_blank" class="yt-link">เล่นเลย</a>
        </div>`;
    });
}

document.getElementById('randomBtn').addEventListener('click', () => {
    const filtered = getFilteredSongs();
    if (filtered.length === 0) { alert("ไม่พบเพลงที่ตรงเงื่อนไข!"); return; }
    const random = filtered[Math.floor(Math.random() * filtered.length)];
    document.getElementById('randomResult').innerHTML = `<div style="background:#fff1f2; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #fda4af;">
        <div style="color:#e11d48; font-weight:bold; margin-bottom:10px; font-size:0.8rem;">🎲 สุ่มได้เพลงนี้:</div>
        <div class="song-row" style="margin-bottom:0; border:none; background:white;">
            <div class="bpm-badge">${random.bpm}</div>
            <div class="song-info"><span class="song-title">${random.title}</span><span class="song-artist">${random.artist}</span></div>
            <a href="https://music.youtube.com/search?q=${encodeURIComponent(random.title + ' ' + random.artist)}" target="_blank" class="yt-link">เล่นเลย</a>
        </div>
    </div>`;
});

document.getElementById('clearFilter').addEventListener('click', () => {
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    document.getElementById('sBpm').value = '';
    document.getElementById('sLang').value = 'all';
    document.getElementById('randomResult').innerHTML = '';
    activeMin = null; activeMax = null; 
    render();
});

document.getElementById('sortBpm').addEventListener('click', () => {
    sortAsc = !sortAsc;
    MUSIC_DB.sort((a, b) => sortAsc ? a.bpm - b.bpm : b.bpm - a.bpm);
    render();
});

document.querySelectorAll('.btn-filter').forEach(btn => btn.addEventListener('click', (e) => {
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    e.currentTarget.classList.add('active');
    activeMin = parseInt(e.currentTarget.dataset.min); 
    activeMax = parseInt(e.currentTarget.dataset.max);
    render();
}));

document.getElementById('sBpm').addEventListener('input', render);
document.getElementById('sLang').addEventListener('change', render);
render();
</script>
