<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08080f;
    --card: #111120;
    --card-hover: #161630;
    --surface: #1a1a2e;
    --text: #f0f0ff;
    --muted: #7a7a9a;
    --border: rgba(255,255,255,0.06);
    --cyan: #00d4ff;
    --pink: #ff2d78;
    --purple: #7c3aed;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    top: -20%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  }
  body::after {
    bottom: 10%; right: -10%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,45,120,0.06) 0%, transparent 70%);
  }

  .app { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 36px; }
  .logo-row { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .logo-text {
    font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .song-count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .song-count span { color: var(--cyan); font-weight: 600; }

  /* Controls */
  .controls { display: flex; gap: 10px; margin-bottom: 20px; }
  .bpm-input {
    flex: 1; padding: 11px 16px; border-radius: 12px;
    background: var(--card); border: 1px solid rgba(0,212,255,0.15);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .bpm-input:focus { border-color: rgba(0,212,255,0.5); }
  .bpm-input::placeholder { color: var(--muted); }
  .lang-select {
    padding: 11px 14px; border-radius: 12px;
    background: var(--card); border: 1px solid rgba(0,212,255,0.15);
    color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.85rem;
    outline: none; cursor: pointer;
  }

  /* Zone chips */
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
  }
  .zone-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
  .zone-chip {
    padding: 10px 4px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08); background: var(--card);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .zone-chip:hover { border-color: rgba(255,255,255,0.2); }
  .zone-chip.active { box-shadow: 0 0 20px var(--zone-glow); }
  .zone-emoji { font-size: 1.1rem; margin-bottom: 2px; }
  .zone-name { font-size: 0.7rem; font-weight: 700; color: var(--text); }
  .zone-range { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); margin-top: 2px; }
  .zone-chip.active .zone-name, .zone-chip.active .zone-range { color: var(--zone-color); }

  /* Actions */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 28px; }
  .action-btn {
    padding: 10px; border-radius: 12px; font-family: 'Outfit', sans-serif;
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.2s; border: 1px solid transparent;
  }
  #clearBtn { background: var(--surface); border-color: rgba(255,255,255,0.08); color: var(--muted); }
  #clearBtn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  #randomBtn { background: rgba(255,45,120,0.12); border-color: rgba(255,45,120,0.3); color: var(--pink); }
  #randomBtn:hover { background: rgba(255,45,120,0.25); }
  #sortBtn { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.25); color: var(--cyan); }
  #sortBtn:hover { background: rgba(0,212,255,0.18); }

  /* Random box */
  #randomResult { margin-bottom: 24px; }
  .random-box {
    padding: 16px 18px; border-radius: 16px;
    background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.3);
    box-shadow: 0 0 24px rgba(255,45,120,0.15); animation: fadeSlide 0.25s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .random-label {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--pink);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
  }

  /* Song rows */
  #results { display: flex; flex-direction: column; gap: 6px; }
  .song-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border-radius: 14px; background: var(--card); border: 1px solid var(--border);
    text-decoration: none; color: inherit; transition: all 0.18s; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .song-row:hover { background: var(--card-hover); border-color: rgba(0,212,255,0.2); transform: translateX(3px); }
  .bpm-badge {
    min-width: 48px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-direction: column; flex-shrink: 0;
  }
  .bpm-num { font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; line-height: 1; }
  .bpm-label { font-family: 'DM Mono', monospace; font-size: 0.5rem; opacity: 0.7; margin-top: 1px; }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .song-artist { font-size: 0.72rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .lang-flag { font-size: 1rem; opacity: 0.7; flex-shrink: 0; }
  .play-btn {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(0,212,255,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .empty-state { text-align: center; padding: 48px 0; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  @media (max-width: 480px) {
    body { padding: 28px 14px 60px; }
    .zone-grid { gap: 5px; }
  }
</style>
</head>

  </div>

  <div id="randomResult"></div>
  <div id="results"></div>
</div>

const FLAGS = {ไทย:'ᴛʜ',สากล:'ᴇɴ',ญี่ปุ่น:'ᴊᴘ',เกาหลี:'ᴋʀ',จีน:'ᴄɴ'};

function getBpmStyle(bpm) {
  if (bpm < 90)  return {color:'#7c3aed',bg:'rgba(124,58,237,0.15)'};
  if (bpm < 110) return {color:'#0891b2',bg:'rgba(8,145,178,0.15)'};
  if (bpm < 130) return {color:'#00d4ff',bg:'rgba(0,212,255,0.15)'};
  if (bpm < 160) return {color:'#f59e0b',bg:'rgba(245,158,11,0.15)'};
  return {color:'#ff2d78',bg:'rgba(255,45,120,0.15)'};
}

let db = [...MUSIC_DB];
let activeMin = null, activeMax = null, sortAsc = true;

function getFiltered() {
  const langVal = document.getElementById('sLang').value;
  const bpmVal  = document.getElementById('sBpm').value;
  return db.filter(s => {
    const matchLang = langVal === 'all' || s.lang === langVal;
    let matchBpm = true;
    if (activeMin !== null) {
      matchBpm = s.bpm >= activeMin && s.bpm <= activeMax;
    } else if (bpmVal) {
      const v = parseInt(bpmVal);
      matchBpm = s.bpm >= v-10 && s.bpm <= v+10;
    }
    return matchLang && matchBpm;
  });
}

function rowHTML(s) {
  const {color,bg} = getBpmStyle(s.bpm);
  const url = 'https://music.youtube.com/search?q=' + encodeURIComponent(s.title+' '+s.artist);
  return `<a href="${url}" target="_blank" class="song-row">
    <div class="bpm-badge" style="background:${bg}">
      <span class="bpm-num" style="color:${color}">${s.bpm}</span>
      <span class="bpm-label" style="color:${color}">BPM</span>
    </div>
    <div class="song-info">
      <span class="song-title">${s.title}</span>
      <span class="song-artist">${s.artist}</span>
    </div>
    <span class="lang-flag">${FLAGS[s.lang]||''}</span>
    <div class="play-btn"><svg width="10" height="12" viewBox="0 0 10 12" fill="#00d4ff"><path d="M0 0L10 6L0 12V0Z"/></svg></div>
  </a>`;
}

function render() {
  const f = getFiltered();
  document.querySelector('.song-count').innerHTML =
    'พบ <span>' + f.length + '</span> เพลง · ทั้งหมด ' + MUSIC_DB.length + ' เพลง';
  const c = document.getElementById('results');
  c.innerHTML = f.length ? f.map(rowHTML).join('') : '<div class="empty-state">ไม่พบเพลงที่ตรงเงื่อนไข</div>';
}

document.querySelectorAll('.zone-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const min = parseInt(btn.dataset.min), max = parseInt(btn.dataset.max);
    const wasActive = activeMin===min && activeMax===max;
    document.querySelectorAll('.zone-chip').forEach(b => {
      b.classList.remove('active'); b.style.background=''; b.style.borderColor='';
    });
    if (wasActive) { activeMin=null; activeMax=null; }
    else {
      activeMin=min; activeMax=max;
      btn.classList.add('active');
      const c = getComputedStyle(btn).getPropertyValue('--zone-color').trim();
      btn.style.borderColor=c; btn.style.background=c+'22';
    }
    document.getElementById('randomResult').innerHTML='';
    render();
  });
});

document.getElementById('sortBtn').addEventListener('click', () => {
  sortAsc = !sortAsc;
  db.sort((a,b) => sortAsc ? a.bpm-b.bpm : b.bpm-a.bpm);
  document.getElementById('sortBtn').textContent = '⇅ BPM ' + (sortAsc?'↑':'↓');
  render();
});

document.getElementById('randomBtn').addEventListener('click', () => {
  const f = getFiltered();
  if (!f.length) return;
  const s = f[Math.floor(Math.random()*f.length)];
  document.getElementById('randomResult').innerHTML =
    '<div class="random-box"><div class="random-label">⚡ สุ่มได้เพลงนี้</div>' + rowHTML(s) + '</div>';
});

document.getElementById('clearBtn').addEventListener('click', () => {
  activeMin=null; activeMax=null;
  document.getElementById('sBpm').value='';
  document.getElementById('sLang').value='all';
  document.getElementById('randomResult').innerHTML='';
  document.querySelectorAll('.zone-chip').forEach(b => {
    b.classList.remove('active'); b.style.background=''; b.style.borderColor='';
  });
  render();
});

document.getElementById('sBpm').addEventListener('input', () => {
  activeMin=null; activeMax=null;
  document.querySelectorAll('.zone-chip').forEach(b => {
    b.classList.remove('active'); b.style.background=''; b.style.borderColor='';
  });
  render();
});
document.getElementById('sLang').addEventListener('change', render);

render();
</script>
