<!DOCTYPE html>
<html lang="th">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TempoDeck">
<link rel="apple-touch-icon" href="https://example.com/icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempoDeck — Minimal BPM Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root { 
    --bg: #F9F9F9; 
    --text: #1A1A1A; 
    --accent: #007AFF; 
    --border: #E5E5E5;
  }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Inter', sans-serif; 
    padding: 40px 20px; 
    line-height: 1.6; 
  }
  .app { max-width: 700px; margin: 0 auto; }
  h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 20px; }
  
  .controls { display: flex; gap: 10px; margin-bottom: 15px; }
  input, select { 
    padding: 10px 15px; 
    border-radius: 6px; 
    border: 1px solid var(--border); 
    background: white; 
    font-family: inherit; 
    flex: 1; 
  }

  /* สไตล์ของปุ่ม Filter ตามแบบในรูป */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }
  .chip {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: #555;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  .song-row { 
    display: flex; 
    align-items: center; 
    padding: 15px 0; 
    border-bottom: 1px solid var(--border); 
  }
  .song-row:last-child { border-bottom: none; }
  .bpm-badge { font-weight: 600; color: #666; width: 80px; font-size: 0.9rem; }
  .song-info { flex: 1; }
  .song-title { font-weight: 500; display: block; color: var(--text); }
  .song-artist { font-size: 0.85rem; color: #888; }
  .lang-tag { 
    font-size: 0.7rem; 
    color: #999; 
    text-transform: uppercase; 
    margin-left: 8px; 
    border: 1px solid #EEE; 
    padding: 2px 6px; 
    border-radius: 4px; 
  }
  
  .yt-link { 
    font-size: 0.85rem; 
    color: var(--accent); 
    text-decoration: none; 
    font-weight: 500; 
    padding: 6px 12px;
    background: rgba(0, 122, 255, 0.08);
    border-radius: 6px;
    transition: background 0.2s;
  }
  .yt-link:hover { background: rgba(0, 122, 255, 0.15); }
  
  .result-count { font-size: 0.85rem; color: #888; margin-bottom: 15px; font-weight: 500; }
</style>
</head>
<body>

<div class="app">
  <h1>TempoDeck</h1>
  
  <div class="controls">
    <input type="number" id="sBpm" placeholder="หรือระบุ BPM เอง (เช่น 120)">
    <select id="sLang">
      <option value="all">ทุกภาษา</option>
      <option value="ไทย">ไทย</option>
      <option value="สากล">สากล</option>
      <option value="ญี่ปุ่น">ญี่ปุ่น</option>
      <option value="เกาหลี">เกาหลี</option>
    </select>
  </div>

  <!-- เพิ่มหมวดหมู่ Filter ที่นี่ -->
  <div class="chips">
    <button class="chip btn-filter" data-min="60" data-max="90">ผ่อนคลาย / บัลลาด (60–90)</button>
    <button class="chip btn-filter" data-min="90" data-max="110">เดิน / ป็อปทั่วไป (90–110)</button>
    <button class="chip btn-filter" data-min="110" data-max="130">เต้น / EDM (110–130)</button>
    <button class="chip btn-filter" data-min="130" data-max="160">วิ่งเหยาะ / คาร์ดิโอ (130–160)</button>
    <button class="chip btn-filter" data-min="160" data-max="190">วิ่งเร็ว / HIIT (160–190)</button>
    <button class="chip" id="clearFilter">ล้างตัวกรอง</button>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div id="results"></div>
</div>

  // วิ่งเร็ว / HIIT (160-190 BPM)
  { title:'Blinding Lights', artist:'The Weeknd', bpm:171, lang:'สากล' },
  { title:'As It Was', artist:'Harry Styles', bpm:174, lang:'สากล' },
  { title:'Stay', artist:'The Kid LAROI', bpm:170, lang:'สากล' },
  { title:'Idol', artist:'YOASOBI', bpm:166, lang:'ญี่ปุ่น' },
  { title:'Monster', artist:'YOASOBI', bpm:170, lang:'ญี่ปุ่น' },

  { title:'Cruel Summer', artist:'Taylor Swift', bpm:170, lang:'สากล' },
  { title:'Party Rock Anthem', artist:'LMFAO', bpm:130, lang:'สากล' },
  { title:'Don\'t Stop Me Now', artist:'Queen', bpm:156, lang:'สากล' },
  { title:'Shut Up and Dance', artist:'Walk The Moon', bpm:128, lang:'สากล' },
  { title:'Mr. Brightside', artist:'The Killers', bpm:148, lang:'สากล' },
  { title:'Centuries', artist:'Fall Out Boy', bpm:167, lang:'สากล' },
  { title:'Immortals', artist:'Fall Out Boy', bpm:153, lang:'สากล' },
  { title:'Light It Up', artist:'Major Lazer', bpm:108, lang:'สากล' },
  { title:'Burn', artist:'Ellie Goulding', bpm:87, lang:'สากล' },
  { title:'Symphony', artist:'Clean Bandit', bpm:123, lang:'สากล' },
  { title:'Rather Be', artist:'Clean Bandit', bpm:121, lang:'สากล' },
  { title:'Rockabye', artist:'Clean Bandit', bpm:102, lang:'สากล' },
  { title:'Mama', artist:'Clean Bandit', bpm:124, lang:'สากล' },
  { title:'Solo', artist:'Clean Bandit', bpm:105, lang:'สากล' }
];

  const sBpm = document.getElementById('sBpm');
  const sLang = document.getElementById('sLang');
  const btnFilters = document.querySelectorAll('.btn-filter');
  const btnClear = document.getElementById('clearFilter');
  const resultCount = document.getElementById('resultCount');

  // ตัวแปรเก็บค่า Range ปัจจุบัน
  let activeMin = null;
  let activeMax = null;

  function render() {
    const container = document.getElementById('results');
    container.innerHTML = '';
    const langQuery = sLang.value;
    const inputBpm = sBpm.value;

    const filtered = MUSIC_DB.filter(s => {
      // ตรวจสอบภาษา
      const matchLang = langQuery !== 'all' ? (s.lang === langQuery) : true;
      
      // ตรวจสอบ BPM (ให้ความสำคัญกับปุ่มกดก่อน ถ้าไม่ได้กดปุ่มให้ดูที่ช่องพิมพ์)
      let matchBpm = true;
      if (activeMin !== null && activeMax !== null) {
        matchBpm = (s.bpm >= activeMin && s.bpm <= activeMax);
      } else if (inputBpm) {
        const target = parseInt(inputBpm);
        matchBpm = (s.bpm >= target - 10 && s.bpm <= target + 10);
      }

      return matchBpm && matchLang;
    });

    // เรียงความเร็วจากน้อยไปมาก
    filtered.sort((a, b) => a.bpm - b.bpm);

    // แสดงจำนวนเพลงที่พบ
    resultCount.textContent = `พบเพลงที่ตรงเงื่อนไข ${filtered.length} เพลง`;

    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">ไม่พบเพลงที่ตรงกับเงื่อนไข</div>';
    }

    filtered.forEach(s => {
      const ytLink = `https://music.youtube.com/search?q=${encodeURIComponent(s.title + ' ' + s.artist)}`;
      container.innerHTML += `
        <div class="song-row">
          <div class="bpm-badge">${s.bpm} BPM</div>
          <div class="song-info">
            <span class="song-title">${s.title}<span class="lang-tag">${s.lang}</span></span>
            <span class="song-artist">${s.artist}</span>
          </div>
          <a href="${ytLink}" target="_blank" class="yt-link">ฟังใน YT Music</a>
        </div>
      `;
    });
  }

  // เมื่อพิมพ์ตัวเลขเอง ให้ยกเลิกการเลือกปุ่มหมวดหมู่
  sBpm.addEventListener('input', () => {
    activeMin = null;
    activeMax = null;
    btnFilters.forEach(btn => btn.classList.remove('active'));
    render();
  });

  // เมื่อเปลี่ยนภาษา
  sLang.addEventListener('change', render);

  // เมื่อคลิกปุ่มหมวดหมู่ BPM
  btnFilters.forEach(btn => {
    btn.addEventListener('click', () => {
      // รีเซ็ตปุ่มอื่น และเซ็ตปุ่มที่โดนคลิกให้ทำงาน
      btnFilters.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // ล้างช่องตัวเลข เพื่อป้องกันความสับสน
      sBpm.value = '';
      
      // ดึงค่า min-max จากปุ่ม
      activeMin = parseInt(btn.getAttribute('data-min'));
      activeMax = parseInt(btn.getAttribute('data-max'));
      
      render();
    });
  });

  // ปุ่มล้างตัวกรอง
  btnClear.addEventListener('click', () => {
    btnFilters.forEach(b => b.classList.remove('active'));
    activeMin = null;
    activeMax = null;
    sBpm.value = '';
    sLang.value = 'all';
    render();
  });

  // โหลดหน้าแรก
  render();
</script>
</body>
</html>
